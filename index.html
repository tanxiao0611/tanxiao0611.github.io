      <main class="profile-layout">

            <a class="icon-link icon-link-text" id="cv-link" target="_blank" rel="noreferrer" aria-label="CV">
              CV
            </a>
          </div>
        </aside>

        <div class="profile-content">
          <section class="panel page-intro">
            <h1 id="name"></h1>
          </section>

          <section class="panel" id="bio">
            <div class="section-heading">
              <h2>Bio</h2>
            </div>
            <p id="about-detail"></p>
          </section>

          <section class="panel" id="research">
            <div class="section-heading">
              <h2>Research Areas</h2>
            </div>
            <ul class="tag-list" id="research-interests"></ul>
          </section>

          <section class="panel" id="publications">
            <div class="section-heading">
              <h2>Publications</h2>
            </div>
            <div class="stack-list" id="publications-list"></div>
          </section>

          <section class="panel" id="experience">
            <div class="section-heading">
              <h2>Experience</h2>
            </div>
            <div class="stack-list" id="experience-list"></div>
